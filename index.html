<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文修煉閣 - English Training Dojo (雲端自動無感同步版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        dojo: {
                            bg: '#0B0F19', 
                            card: '#131B2E', 
                            accent: '#F59E0B', 
                            warmOrange: '#F97316', 
                            neonBlue: '#38BDF8', 
                            neonGreen: '#34D399', 
                            neonRed: '#F87171', 
                            royalBlue: '#1D4ED8', 
                        }
                    },
                    boxShadow: {
                        'neon-amber': '0 0 25px rgba(245, 158, 11, 0.45)',
                        'neon-orange': '0 0 25px rgba(249, 115, 22, 0.5)',
                        'neon-sky': '0 0 25px rgba(56, 189, 248, 0.4)',
                        'neon-emerald': '0 0 25px rgba(52, 211, 153, 0.4)',
                        'neon-blue': '0 0 25px rgba(29, 78, 216, 0.55)', 
                        'neon-rose': '0 0 25px rgba(244, 63, 94, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0F19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(11, 15, 25, 0.9) 0px, transparent 50%),
                radial-gradient(at 50% 0%, rgba(29, 78, 216, 0.08) 0px, transparent 50%),
                radial-gradient(at 80% 20%, rgba(249, 115, 22, 0.04) 0px, transparent 40%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(19, 27, 46, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-input {
            background: rgba(11, 15, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flip-card { perspective: 1000px; }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .flip-card-back { transform: rotateY(180deg); }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.03); }
        }
        .glow-pulse { animation: pulse-glow 4s infinite ease-in-out; }

        @keyframes waves {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .audio-wave-bar { animation: waves 1s ease-in-out infinite; }
        .audio-wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .audio-wave-bar:nth-child(3) { animation-delay: 0.3s; }
        .audio-wave-bar:nth-child(4) { animation-delay: 0.45s; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(11, 15, 25, 0.5); }
        ::-webkit-scrollbar-thumb { background: rgba(29, 78, 216, 0.3); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.5); }

        /* Dict Word Hover Effect */
        .dict-word {
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.4);
            padding: 0 1px;
        }
        .dict-word:hover {
            color: #38BDF8;
            border-bottom: 1px dashed #38BDF8;
            background-color: rgba(56, 189, 248, 0.15);
            border-radius: 4px;
        }
        .dict-word:active { color: #F59E0B; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col justify-between selection:bg-blue-500/30 selection:text-blue-200">

    <header class="glass-panel border-b border-slate-850 sticky top-0 z-40 py-3.5 px-4 sm:px-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            
            <div onclick="goHome()" class="flex items-center gap-3 cursor-pointer group select-none hover:opacity-95 active:scale-98 transition-all">
                <div class="bg-gradient-to-br from-amber-500 via-orange-500 to-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-500/20 group-hover:scale-105 group-hover:rotate-3 transition-all duration-300">
                    <span class="text-3xl text-white block transform group-hover:scale-110 transition-transform">⛩️</span>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-2xl sm:text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-orange-400 to-blue-400 leading-none">
                        英文修煉閣
                    </h1>
                    <p class="text-xs sm:text-sm font-extrabold text-slate-400 group-hover:text-slate-300 transition-colors mt-1.5 tracking-widest uppercase font-mono">
                        English Training Dojo
                    </p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-2 sm:gap-3 bg-slate-950/70 p-2 rounded-2xl border border-slate-800/80 justify-between md:justify-start">
                
                <button onclick="openStatsModal()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-900/90 border border-slate-800 hover:border-orange-500/30 rounded-xl transition-all hover:bg-slate-850 active:scale-95 group">
                    <span class="text-sm font-black text-orange-400 group-hover:scale-105 transition-transform"><i class="fa-solid fa-chart-line mr-1"></i> 修行法海</span>
                </button>

                <div onclick="openSyncSettingsModal()" id="header-sync-badge" class="flex items-center gap-2 px-3 py-1.5 bg-slate-900/80 hover:bg-slate-800 border border-slate-850 hover:border-blue-500/50 rounded-xl cursor-pointer transition-all active:scale-95 text-slate-400 hover:text-blue-400 group" title="雲端同步法陣設定">
                    <i id="header-sync-icon" class="fa-solid fa-cloud animate-pulse text-base"></i>
                    <span id="header-sync-status" class="text-xs font-bold">手動修行</span>
                </div>

                <div class="h-6 w-[1px] bg-slate-800 hidden md:block"></div>

                <div class="flex items-center gap-2 px-1 sm:px-2">
                    <div class="relative flex items-center justify-center">
                        <i class="fa-solid fa-crown text-orange-500 text-lg"></i>
                    </div>
                    <div>
                        <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">修煉境界</div>
                        <div class="text-sm sm:text-base font-black text-orange-400 leading-tight" id="user-rank">新手侍從</div>
                    </div>
                </div>
                
                <div class="h-6 w-[1px] bg-slate-800"></div>

                <div class="flex-1 md:w-32 lg:w-40 px-2 min-w-[100px]">
                    <div class="flex justify-between text-[10px] mb-1">
                        <span class="text-slate-450 font-bold">修為 (EXP)</span>
                        <span id="exp-ratio-color" class="text-orange-400 font-extrabold"><span id="exp-ratio">0 / 100</span></span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-2 overflow-hidden border border-slate-800/60">
                        <div id="exp-bar" class="bg-gradient-to-r from-orange-400 via-blue-500 to-amber-400 h-full w-0 transition-all duration-500 ease-out"></div>
                    </div>
                </div>

                <div class="h-6 w-[1px] bg-slate-800"></div>

                <div class="flex items-center gap-1.5 px-2 text-emerald-400 font-black text-sm sm:text-base" id="streak-container">
                    <i class="fa-solid fa-fire text-orange-500 animate-bounce"></i>
                    <span><span id="streak-count">0</span> 連擊</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 py-6 flex-1 flex flex-col gap-5 relative z-10">
        
        <section id="dojo-selector-section" class="grid grid-cols-1 md:grid-cols-2 gap-5 transition-all duration-300">
            <button id="dojo-btn-vocab" onclick="switchDojo('vocab')" class="relative overflow-hidden group rounded-2xl p-6 flex items-center justify-between border transition-all duration-300 transform hover:-translate-y-0.5 text-left glass-panel border-orange-500/40 shadow-neon-orange">
                <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/5 group-hover:bg-orange-500/10 rounded-full blur-2xl transition-all duration-300 pointer-events-none"></div>
                <div class="flex items-center gap-5">
                    <div class="bg-orange-500/10 text-orange-500 p-4 rounded-xl group-hover:bg-orange-500/20 transition-all duration-300">
                        <i class="fa-solid fa-book-open text-3xl sm:text-4xl"></i>
                    </div>
                    <div>
                        <div class="text-xs sm:text-sm text-orange-500 font-black uppercase tracking-widest font-mono">Vocabulary Dojo</div>
                        <h2 class="text-xl sm:text-2xl font-black text-slate-100 mt-1">單字練功房</h2>
                        <p class="text-sm text-slate-455 mt-1.5">淬鍊核心字彙與單字應用能力</p>
                    </div>
                </div>
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-900 border border-slate-800 text-slate-400 group-hover:text-orange-500 group-hover:border-orange-500/30 transition-all duration-300">
                    <i class="fa-solid fa-chevron-right text-base"></i>
                </div>
                <div id="vocab-active-border" class="absolute inset-x-0 bottom-0 h-1 bg-orange-500 scale-x-100 transition-transform duration-300"></div>
            </button>

            <button id="dojo-btn-phrase" onclick="switchDojo('phrase')" class="relative overflow-hidden group rounded-2xl p-6 flex items-center justify-between border transition-all duration-300 transform hover:-translate-y-0.5 text-left glass-panel border-slate-800 hover:border-blue-500/40">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 group-hover:bg-blue-500/10 rounded-full blur-2xl transition-all duration-300 pointer-events-none"></div>
                <div class="flex items-center gap-5">
                    <div class="bg-blue-500/10 text-blue-400 p-4 rounded-xl group-hover:bg-blue-500/20 transition-all duration-300">
                        <i class="fa-solid fa-comments text-3xl sm:text-4xl"></i>
                    </div>
                    <div>
                        <div class="text-xs sm:text-sm text-blue-400 font-black uppercase tracking-widest font-mono">Phrase Dojo</div>
                        <h2 class="text-xl sm:text-2xl font-black text-slate-100 mt-1">片語練功房</h2>
                        <p class="text-sm text-slate-455 mt-1.5">掌握道地片語與日常句型搭配</p>
                    </div>
                </div>
                <div class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-900 border border-slate-800 text-slate-400 group-hover:text-blue-500 group-hover:border-blue-500/30 transition-all duration-300">
                    <i class="fa-solid fa-chevron-right text-base"></i>
                </div>
                <div id="phrase-active-border" class="absolute inset-x-0 bottom-0 h-1 bg-blue-500 scale-x-0 transition-transform duration-300"></div>
            </button>
        </section>

        <section id="difficulty-selector-section" class="glass-panel rounded-3xl p-3 shadow-md relative overflow-hidden transition-all duration-300">
            <div class="relative z-10 flex flex-col items-center gap-2.5">
                <div class="flex items-center gap-2 text-xs sm:text-sm text-orange-400 font-bold uppercase tracking-widest">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>選擇單字難度級別 (DIFFICULTY)</span>
                </div>
                <div class="flex flex-wrap justify-center gap-2 w-full max-w-4xl" id="difficulty-tabs-container"></div>
            </div>
        </section>

        <section id="level-selector-section" class="glass-panel rounded-3xl p-4 shadow-md relative overflow-hidden transition-all duration-300 bg-slate-900/60 border border-slate-800/80">
            <div id="level-bg-glow" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-20 bg-orange-500/5 blur-3xl pointer-events-none rounded-full glow-pulse"></div>
            <div class="relative z-10 flex flex-col items-center gap-3">
                <div class="flex items-center gap-2 text-[11px] sm:text-xs text-slate-400 font-bold uppercase tracking-widest">
                    <i id="level-group-icon" class="fa-solid fa-crown text-orange-400"></i>
                    <span>選擇您的修煉境界 (LEVELS)</span>
                </div>
                <div class="grid grid-cols-4 sm:grid-cols-7 gap-2 w-full max-w-4xl" id="level-tabs-container"></div>
            </div>
        </section>

        <section id="unit-selector-section" class="glass-panel rounded-3xl p-3 shadow-md relative overflow-hidden transition-all duration-300 bg-slate-900/60 border border-slate-800/80">
            <div class="relative z-10 flex flex-col items-center gap-2.5">
                <div class="flex items-center gap-2 text-[11px] sm:text-xs text-slate-400 font-bold uppercase tracking-widest">
                    <i class="fa-solid fa-bookmark text-emerald-450"></i>
                    <span>選擇修煉小章節 (UNITS)</span>
                </div>
                <div class="flex flex-wrap justify-center gap-1.5 w-full max-w-4xl" id="unit-tabs-container"></div>
            </div>
        </section>

        <section class="glass-panel rounded-3xl p-3 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 sm:gap-3 shadow-md">
            <button onclick="switchTab('list')" id="tab-btn-list" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200">
                <i class="fa-solid fa-list-check text-xs sm:text-sm"></i> <span>修煉清單</span>
            </button>
            <button onclick="switchTab('flashcard')" id="tab-btn-flashcard" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200">
                <i class="fa-solid fa-clone text-xs sm:text-sm"></i> <span>記憶卡牌</span>
            </button>
            <button onclick="switchTab('quiz')" id="tab-btn-quiz" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200">
                <i class="fa-solid fa-shield-halved text-xs sm:text-sm"></i> <span>境界試煉</span>
            </button>
            <button onclick="switchTab('spelling')" id="tab-btn-spelling" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200">
                <i class="fa-solid fa-keyboard text-xs sm:text-sm"></i> <span>字彙淬鍊</span>
            </button>
            <button onclick="switchTab('cloze')" id="tab-btn-cloze" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200">
                <i class="fa-solid fa-file-pen text-xs sm:text-sm"></i> <span>語境填空</span>
            </button>
            <button onclick="switchTab('admin')" id="tab-btn-admin" class="w-full py-2.5 sm:py-3 px-2 rounded-xl flex items-center justify-center gap-1.5 sm:gap-2 font-bold text-xs sm:text-sm transition-all duration-200 border border-blue-500/20 hover:border-blue-500/50">
                <i class="fa-solid fa-cloud-arrow-up text-blue-400 text-xs sm:text-sm"></i> <span class="text-blue-300">📥 匯入管理</span>
            </button>
        </section>

        <section class="flex-1 flex flex-col min-h-[420px]">
            <div id="dojo-content" class="flex-1 w-full glass-panel rounded-3xl p-5 sm:p-6 shadow-2xl relative"></div>
        </section>
    </main>

    <!-- Dictionary Modal -->
    <div id="dictionary-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-panel border border-blue-500/40 max-w-lg w-full mx-4 rounded-3xl p-6 shadow-2xl scale-95 transition-transform duration-300 flex flex-col gap-4 relative">
            <button onclick="closeDictionaryModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="flex items-center gap-3 text-blue-400 border-b border-slate-800 pb-3">
                <i class="fa-solid fa-book-atlas text-2xl"></i>
                <h3 class="text-lg font-black tracking-widest">英漢靈光法典</h3>
            </div>
            
            <div id="dictionary-content" class="flex flex-col gap-3 min-h-[150px] max-h-[60vh] overflow-y-auto pr-2">
                <div class="flex justify-center items-center h-full text-slate-500">
                    <i class="fa-solid fa-spinner animate-spin text-2xl"></i>
                </div>
            </div>
            
            <div class="flex justify-end mt-2 pt-3 border-t border-slate-800">
                <button onclick="closeDictionaryModal()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-slate-300 font-bold text-xs rounded-xl border border-slate-700 transition-colors">
                    關閉法典
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-24 right-6 z-[60] flex flex-col gap-3 pointer-events-none"></div>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col-reverse items-end gap-3 pointer-events-auto">
        <button onclick="toggleVoicePanel()" class="w-14 h-14 bg-slate-900 border border-slate-750 hover:border-orange-550 rounded-full shadow-2xl flex items-center justify-center text-orange-450 hover:text-orange-400 transition-all hover:scale-105 group relative" title="語音引擎設定">
            <div class="absolute inset-0 bg-orange-500/10 rounded-full blur group-hover:bg-orange-500/20 transition-all"></div>
            <i class="fa-solid fa-headphones text-xl relative z-10"></i>
        </button>

        <div id="voice-settings-panel" class="hidden glass-panel border border-slate-750 p-4 rounded-2xl shadow-2xl w-64 origin-bottom-right transition-all">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-3">
                <h4 class="text-sm font-black text-slate-200"><i class="fa-solid fa-volume-high mr-2 text-orange-400"></i>語音發音設定</h4>
                <button onclick="toggleVoicePanel()" class="text-slate-500 hover:text-slate-300"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="block text-[10px] text-slate-400 font-bold mb-2 uppercase tracking-wider">發音腔調 (Accent)</label>
                    <div class="flex gap-2 bg-slate-950/60 p-1 rounded-xl border border-slate-850">
                        <button id="accent-btn-US" onclick="setAccent('US')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all">🇺🇸 美式</button>
                        <button id="accent-btn-UK" onclick="setAccent('UK')" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all">🇬🇧 英式</button>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider">語速速度 (Speed)</label>
                        <span id="speed-display" class="text-xs font-black text-orange-400 font-mono">0.85x</span>
                    </div>
                    <input type="range" id="speech-speed-slider" min="0.5" max="1.5" step="0.05" value="0.85" class="w-full accent-orange-500 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" oninput="setSpeed(this.value)">
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-panel border border-rose-500/30 max-w-md w-full mx-4 rounded-3xl p-6 shadow-2xl scale-95 transition-transform duration-300 flex flex-col gap-4">
            <div class="flex items-center gap-3 text-rose-400">
                <i class="fa-solid fa-triangle-exclamation text-3xl shrink-0"></i>
                <h3 class="text-lg font-black" id="confirm-modal-title">確認執行此法陣操作？</h3>
            </div>
            <p class="text-sm text-slate-350 leading-relaxed" id="confirm-modal-desc">清空操作將會抹除現有修行記錄，且無法再次召回。</p>
            <div class="flex gap-3 justify-end mt-2">
                <button id="confirm-modal-cancel" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-slate-400 font-bold text-xs rounded-xl border border-slate-800 transition-colors">取消修行</button>
                <button id="confirm-modal-proceed" class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-white font-black text-xs rounded-xl shadow-lg shadow-rose-600/20 transition-all">確定清空</button>
            </div>
        </div>
    </div>

    <!-- Sync Settings Modal -->
    <div id="sync-settings-modal" class="fixed inset-0 bg-slate-950/85 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel border border-blue-500/30 max-w-lg w-full mx-4 rounded-3xl p-6 shadow-2xl scale-95 transition-transform duration-300 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <div class="flex items-center gap-2.5 text-blue-450">
                    <i class="fa-solid fa-cloud-arrow-down text-xl"></i>
                    <h3 class="text-lg font-black">雲端同步大陣設定</h3>
                </div>
                <button onclick="closeSyncSettingsModal()" class="text-slate-400 hover:text-white p-1 rounded-lg transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="block text-[10px] text-blue-300 font-extrabold mb-1">GitHub JSON Raw URL</label>
                    <textarea id="modal-sync-url-input" rows="3" class="w-full px-3 py-2.5 bg-slate-950 border border-slate-850 focus:border-blue-500 rounded-xl text-xs font-semibold text-slate-200 outline-none transition-colors resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] text-blue-300 font-extrabold mb-1">同步覆蓋模式</label>
                        <select id="modal-sync-mode" class="w-full px-2.5 py-2 bg-slate-900 border border-slate-850 rounded-lg text-xs font-bold text-slate-200 outline-none">
                            <option value="merge">合併儲存 (保留現有)</option>
                            <option value="overwrite">完全覆蓋 (清空舊大典)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-blue-300 font-extrabold mb-1">自動同步機制</label>
                        <select id="modal-sync-onload" class="w-full px-2.5 py-2 bg-slate-900 border border-slate-850 rounded-lg text-xs font-bold text-slate-200 outline-none">
                            <option value="true">開啟：網頁載入時自動拉取</option>
                            <option value="false">關閉：手動點擊才拉取</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex gap-3 justify-end mt-2">
                <button onclick="fillModalSampleUrl()" class="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-blue-300 font-bold text-xs rounded-xl border border-slate-800 transition-all">帶入測試 JSON 連結</button>
                <button onclick="saveAndTriggerSync()" class="px-5 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black text-xs rounded-xl shadow-lg transition-all flex items-center gap-1.5"><i class="fa-solid fa-bolt text-xs"></i> 啟動並儲存法陣</button>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div id="stats-dashboard-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel border border-orange-500/30 max-w-lg w-full mx-4 rounded-3xl p-6 shadow-2xl scale-95 transition-transform duration-300 flex flex-col gap-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <div class="flex items-center gap-2.5 text-orange-400">
                    <i class="fa-solid fa-chart-pie text-2xl"></i>
                    <h3 class="text-lg font-black">個人修煉數據大觀</h3>
                </div>
                <button onclick="closeStatsModal()" class="text-slate-400 hover:text-white p-1 rounded-lg transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 rounded-2xl bg-slate-900/60 border border-slate-800/80 text-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block mb-1">修煉總次數</span>
                    <span id="stats-total-answered" class="text-2xl sm:text-3xl font-black text-white font-mono">0</span>
                </div>
                <div class="p-4 rounded-2xl bg-slate-900/60 border border-slate-800/80 text-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block mb-1">境界修行正確率</span>
                    <span id="stats-accuracy" class="text-2xl sm:text-3xl font-black text-emerald-400 font-mono">0%</span>
                </div>
                <div class="p-4 rounded-2xl bg-slate-900/60 border border-slate-800/80 text-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block mb-1">當前修行連擊</span>
                    <span id="stats-current-streak" class="text-2xl sm:text-3xl font-black text-orange-450 font-mono">0</span>
                </div>
                <div class="p-4 rounded-2xl bg-slate-900/60 border border-slate-800/80 text-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block mb-1">歷史最高連擊</span>
                    <span id="stats-highest-streak" class="text-2xl sm:text-3xl font-black text-orange-400 font-mono">0</span>
                </div>
            </div>
            <div class="p-4 rounded-2xl bg-slate-950/40 border border-slate-800 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🛡️</span>
                    <div>
                        <h4 class="text-sm font-black text-slate-100">CEFR 估算英文修為</h4>
                        <p class="text-[11px] text-slate-400 mt-0.5">基於您的歷史修行軌跡評估</p>
                    </div>
                </div>
                <span id="stats-cefr-rank" class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-blue-400 font-mono">A1 (築基)</span>
            </div>
            <div class="flex justify-end mt-2">
                <button onclick="resetStats()" class="px-4 py-2 bg-rose-500/10 hover:bg-rose-500/20 text-rose-300 border border-rose-500/20 rounded-xl font-bold text-xs mr-auto transition-all"><i class="fa-solid fa-trash-can mr-1.5"></i>重置修煉統計</button>
                <button onclick="closeStatsModal()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-slate-300 font-black text-xs rounded-xl border border-slate-800 transition-colors">合上法典</button>
            </div>
        </div>
    </div>

    <script>
        let mainDatabase = { vocab: { basic: {}, intermediate: {}, advanced: {} }, phrase: {} };
        
        let userState = {
            currentDojo: 'vocab', currentDifficulty: 'basic', currentLevel: 1, currentUnit: 1, currentTab: 'list', 
            exp: 0, streak: 0, highestStreak: 0, quizIndex: 0, spellingIndex: 0, clozeIndex: 0, flashcardIndex: 0,
            correctCount: 0, totalAnswered: 0, voiceAccent: 'US', speechRate: 0.85,
            autoSyncUrl: "https://raw.githubusercontent.com/less1324-blip/English-Training-Dojo/6b8a9bab3678daba7ad0f932fa13d29a6e1ed24c/intermediateL1.json",
            autoSyncMode: "merge", autoSyncOnLoad: true
        };

        let isAdminUnlocked = false;
        let currentQuizWord = ""; // Global state to prevent option mismatch

        function getThemeColors() {
            const isVocab = userState.currentDojo === 'vocab';
            return {
                primary: isVocab ? 'orange-500' : 'blue-600', primaryHover: isVocab ? 'orange-400' : 'blue-500',
                text: isVocab ? 'text-orange-400' : 'text-blue-400', textHover: isVocab ? 'hover:text-orange-400' : 'hover:text-blue-400',
                border: isVocab ? 'border-orange-500/30' : 'border-blue-500/30', borderFocus: isVocab ? 'focus:border-orange-500' : 'focus:border-blue-500',
                shadow: isVocab ? 'shadow-neon-orange' : 'shadow-neon-blue', bgLight: isVocab ? 'bg-orange-500/10' : 'bg-blue-500/10',
                bgHover: isVocab ? 'hover:bg-orange-500/20' : 'hover:bg-blue-500/20', gradient: isVocab ? 'from-orange-500 to-amber-600' : 'from-blue-600 to-indigo-700',
                gradientNext: isVocab ? 'from-orange-500 to-amber-500' : 'from-blue-600 to-indigo-600',
                btnTheme: isVocab ? 'bg-orange-500 text-slate-950 font-black shadow-neon-orange' : 'bg-blue-600 text-white font-black shadow-neon-blue',
                iconColor: isVocab ? 'text-orange-400' : 'text-blue-400', waveColor: isVocab ? 'bg-orange-400' : 'bg-blue-400'
            };
        }

        let globalAudioCtx = null;
        function initAudioContext() {
            if (!globalAudioCtx) globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (globalAudioCtx.state === 'suspended') globalAudioCtx.resume();
        }

        function getActiveDataList() {
            if (userState.currentDojo === 'vocab') {
                return (mainDatabase.vocab[userState.currentDifficulty]?.[userState.currentLevel] || []).filter(item => (item.unit || 1) === userState.currentUnit);
            } else {
                return (mainDatabase.phrase?.[userState.currentLevel] || []).filter(item => (item.unit || 1) === userState.currentUnit);
            }
        }

        function goHome() {
            playSound('click');
            userState.currentDojo = 'vocab'; userState.currentDifficulty = 'basic'; userState.currentLevel = 1; userState.currentUnit = 1; userState.currentTab = 'list';
            userState.flashcardIndex = 0; userState.quizIndex = 0; userState.spellingIndex = 0; userState.clozeIndex = 0;
            saveProgress(); updateDojoTabUI(); renderDifficultySelector(); renderLevelSelector(); renderUnitSelector(); updateTabButtonsUI(); renderContent();
            showToast("☯️ 已返回英文修煉大殿", "success");
        }

        function playSound(type) {
            try {
                initAudioContext(); const osc = globalAudioCtx.createOscillator(); const gain = globalAudioCtx.createGain();
                osc.connect(gain); gain.connect(globalAudioCtx.destination);
                if (type === 'correct') {
                    osc.frequency.setValueAtTime(523.25, globalAudioCtx.currentTime); osc.frequency.setValueAtTime(659.25, globalAudioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, globalAudioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.35);
                    osc.start(); osc.stop(globalAudioCtx.currentTime + 0.35);
                } else if (type === 'wrong') {
                    osc.frequency.setValueAtTime(220.00, globalAudioCtx.currentTime); osc.frequency.setValueAtTime(146.83, globalAudioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.12, globalAudioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(globalAudioCtx.currentTime + 0.4);
                } else if (type === 'click') {
                    osc.frequency.setValueAtTime(700, globalAudioCtx.currentTime); gain.gain.setValueAtTime(0.04, globalAudioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + 0.08); osc.start(); osc.stop(globalAudioCtx.currentTime + 0.08);
                } else if (type === 'levelUp') {
                    [261.63, 329.63, 392.00, 523.25, 659.25].forEach((freq, idx) => {
                        const noteOsc = globalAudioCtx.createOscillator(); const noteGain = globalAudioCtx.createGain();
                        noteOsc.connect(noteGain); noteGain.connect(globalAudioCtx.destination);
                        noteOsc.frequency.setValueAtTime(freq, globalAudioCtx.currentTime + idx * 0.1);
                        noteGain.gain.setValueAtTime(0.06, globalAudioCtx.currentTime + idx * 0.1); noteGain.gain.exponentialRampToValueAtTime(0.001, globalAudioCtx.currentTime + idx * 0.1 + 0.3);
                        noteOsc.start(globalAudioCtx.currentTime + idx * 0.1); noteOsc.stop(globalAudioCtx.currentTime + idx * 0.1 + 0.3);
                    });
                }
            } catch(e) {}
        }

        let speechVoicesLoaded = false;
        if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => { speechVoicesLoaded = true; };

        function speakWord(text) {
            initAudioContext();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                document.querySelectorAll('.voice-wave-container').forEach(el => el.classList.remove('hidden'));
                
                let cleanWordForSpeech = text.replace(/\([^)]+\)/g, '').replace(/\[[^\]]+\]/g, '').trim().replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\//g, "or");
                const utterance = new SpeechSynthesisUtterance(cleanWordForSpeech);
                
                const targetLang = userState.voiceAccent === 'UK' ? 'en-GB' : 'en-US';
                utterance.lang = targetLang; utterance.rate = userState.speechRate || 0.85;
                const voices = window.speechSynthesis.getVoices();
                let selectedVoice = voices.find(v => v.lang === targetLang || v.lang.replace('_', '-').startsWith(targetLang)) || voices.find(v => v.lang.startsWith('en-') || v.lang.startsWith('en_'));
                if (selectedVoice) utterance.voice = selectedVoice;

                utterance.onend = () => { document.querySelectorAll('.voice-wave-container').forEach(el => el.classList.add('hidden')); };
                setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
            }
        }

        function toggleVoicePanel() { playSound('click'); document.getElementById('voice-settings-panel').classList.toggle('hidden'); }
        function setAccent(accent) { playSound('click'); userState.voiceAccent = accent; updateVoicePanelUI(); saveProgress(); showToast(`切換為 ${accent === 'US' ? '🇺🇸 美式' : '🇬🇧 英式'} 發音`, 'info'); }
        function setSpeed(speed) { userState.speechRate = parseFloat(speed); document.getElementById('speed-display').textContent = `${userState.speechRate.toFixed(2)}x`; saveProgress(); }

        function updateVoicePanelUI() {
            const btnUS = document.getElementById('accent-btn-US'); const btnUK = document.getElementById('accent-btn-UK');
            if (!btnUS || !btnUK) return;
            if (userState.voiceAccent === 'US') {
                btnUS.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all bg-orange-500 text-slate-950 shadow-sm';
                btnUK.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200';
            } else {
                btnUK.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white shadow-sm';
                btnUS.className = 'flex-1 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-400 hover:text-slate-200';
            }
            const slider = document.getElementById('speech-speed-slider'); const display = document.getElementById('speed-display');
            if (slider && display) { slider.value = userState.speechRate; display.textContent = `${Number(userState.speechRate).toFixed(2)}x`; }
        }

        // 新增：從本地修煉大典尋找中文解釋的函式
        function findLocalMeaning(searchWord) {
            if (!searchWord) return null;
            const sw = searchWord.toLowerCase();
            
            // 搜尋單字庫
            for (const diff of ['basic', 'intermediate', 'advanced']) {
                for (let l = 1; l <= 7; l++) {
                    const list = mainDatabase.vocab[diff]?.[l] || [];
                    const found = list.find(item => item.word.toLowerCase() === sw);
                    if (found) return found.chinese;
                }
            }
            
            // 搜尋片語庫
            for (let l = 1; l <= 7; l++) {
                const list = mainDatabase.phrase?.[l] || [];
                const found = list.find(item => item.word.toLowerCase() === sw);
                if (found) return found.chinese;
            }
            
            return null;
        }

        async function fetchDictionaryDefinition(word) {
            try {
                let cleanWord = word.replace(/[.,!?";:'()]/g, '').trim().toLowerCase();
                if(!cleanWord) return null;
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanWord}`);
                if (!res.ok) throw new Error("Not found");
                const data = await res.json();
                return data[0];
            } catch (err) {
                return null;
            }
        }

        function openDictionaryModal(word) {
            playSound('click');
            const modal = document.getElementById('dictionary-modal');
            const content = document.getElementById('dictionary-content');
            
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.remove('scale-95');
            
            content.innerHTML = `
                <div class="flex justify-center items-center py-8">
                    <div class="flex flex-col items-center gap-3">
                        <i class="fa-solid fa-spinner animate-spin text-3xl text-blue-500"></i>
                        <span class="text-sm text-slate-400 font-bold tracking-widest animate-pulse">正在翻閱天地法典尋找「${word}」...</span>
                    </div>
                </div>
            `;

            // 先從本地庫抓取中文翻譯
            const localChinese = findLocalMeaning(word);

            fetchDictionaryDefinition(word).then(data => {
                if (!data) {
                    content.innerHTML = `
                        <div class="text-center py-6">
                            <i class="fa-solid fa-book-journal-whills text-4xl text-slate-600 mb-3"></i>
                            <h4 class="text-lg font-black text-rose-400 mb-1">${word}</h4>
                            ${localChinese ? `<p class="text-base font-bold text-orange-400 mb-2">${localChinese}</p>` : ''}
                            <p class="text-sm text-slate-400">在線上法典中找不到此單字的詳細英英記載。<br>可能為專有名詞、過去式或特殊變體。</p>
                        </div>
                    `;
                    return;
                }

                let phonetics = data.phonetics.find(p => p.text) || { text: '' };
                let defsHtml = '';
                
                data.meanings.slice(0, 2).forEach(meaning => {
                    defsHtml += `
                        <div class="mb-4 last:mb-0">
                            <div class="text-xs font-black text-orange-400 uppercase tracking-widest bg-orange-500/10 inline-block px-2 py-0.5 rounded border border-orange-500/20 mb-2">${meaning.partOfSpeech}</div>
                    `;
                    meaning.definitions.slice(0, 2).forEach((def, idx) => {
                        defsHtml += `
                            <div class="mb-2.5 pl-2 border-l-2 border-slate-700">
                                <p class="text-sm text-slate-200 font-bold leading-relaxed mb-1">${idx + 1}. ${def.definition}</p>
                                ${def.example ? `<p class="text-[11px] text-blue-300 font-medium italic">" ${def.example} "</p>` : ''}
                            </div>
                        `;
                    });
                    defsHtml += `</div>`;
                });

                content.innerHTML = `
                    <div class="flex flex-col gap-1 border-b border-slate-800 pb-3 mb-3">
                        <div class="flex items-center gap-3">
                            <h4 class="text-2xl font-black text-white tracking-wide">${data.word}</h4>
                            <button onclick="speakWord('${data.word.replace(/'/g, "\\'")}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 transition-all">
                                <i class="fa-solid fa-volume-high text-xs"></i>
                            </button>
                        </div>
                        ${localChinese ? `<p class="text-base font-bold text-orange-400 my-1">${localChinese}</p>` : ''}
                        ${phonetics.text ? `<span class="text-xs font-mono text-slate-400">${phonetics.text}</span>` : ''}
                    </div>
                    <div class="flex-1">${defsHtml}</div>
                `;
            });
        }

        function closeDictionaryModal() {
            playSound('click');
            const modal = document.getElementById('dictionary-modal');
            modal.classList.add('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.add('scale-95');
        }

        function createClickableSentence(sentenceText) {
            if (!sentenceText) return '';
            const words = sentenceText.split(' ');
            return words.map(w => {
                const cleanWord = w.replace(/^[^a-zA-Z0-9]+|[^a-zA-Z0-9]+$/g, '').replace(/'/g, "\\'");
                const safeW = w.replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                if (!cleanWord) return safeW;
                return `<span class="dict-word relative inline-block" onclick="openDictionaryModal('${cleanWord}')">${safeW}</span>`;
            }).join(' ');
        }

        function loadProgress() {
            let savedState = null; let savedMainDb = null;
            try { savedState = localStorage.getItem('english_dojo_state_v5'); savedMainDb = localStorage.getItem('english_dojo_main_db_v5'); } catch (e) {}
            if (savedState) {
                try { 
                    userState = { ...userState, ...JSON.parse(savedState) }; 
                    if (!userState.autoSyncUrl) userState.autoSyncUrl = "https://raw.githubusercontent.com/less1324-blip/English-Training-Dojo/6b8a9bab3678daba7ad0f932fa13d29a6e1ed24c/intermediateL1.json";
                } catch(e) {}
            }
            if (savedMainDb) {
                try { 
                    const parsedDB = JSON.parse(savedMainDb); 
                    if (parsedDB.vocab && (Array.isArray(parsedDB.vocab['1']) || Array.isArray(parsedDB.vocab['2']))) {
                        parsedDB.vocab = { basic: {}, intermediate: {}, advanced: {} };
                        for(let l=1; l<=7; l++) if(JSON.parse(savedMainDb).vocab[l]) parsedDB.vocab.basic[l] = JSON.parse(savedMainDb).vocab[l];
                    }
                    mainDatabase = parsedDB;
                } catch(e) {}
            }
            ['basic', 'intermediate', 'advanced'].forEach(diff => {
                for (let l = 1; l <= 7; l++) {
                    if (!mainDatabase.vocab[diff]) mainDatabase.vocab[diff] = {};
                    if (!mainDatabase.vocab[diff][l]) mainDatabase.vocab[diff][l] = [];
                    mainDatabase.vocab[diff][l].forEach(item => { if (!item.unit) item.unit = 1; });
                }
            });
            for (let l = 1; l <= 7; l++) {
                if (!mainDatabase.phrase[l]) mainDatabase.phrase[l] = [];
                mainDatabase.phrase[l].forEach(item => { if (!item.unit) item.unit = 1; });
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem('english_dojo_state_v5', JSON.stringify(userState));
                localStorage.setItem('english_dojo_main_db_v5', JSON.stringify(mainDatabase));
            } catch (e) { console.warn("Local storage write error."); }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let icon = 'fa-circle-info text-orange-400', border = 'border-slate-800';
            if (type === 'success') { icon = 'fa-circle-check text-emerald-400'; border = 'border-emerald-500/30'; }
            else if (type === 'error') { icon = 'fa-circle-exclamation text-rose-400'; border = 'border-rose-500/30'; }
            toast.className = `glass-panel ${border} p-4 rounded-xl flex items-center gap-3 shadow-lg pointer-events-auto transition-all duration-300 transform translate-y-2 opacity-0 max-w-sm`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-lg shrink-0"></i><div class="text-sm font-semibold text-slate-100">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 50);
            setTimeout(() => { toast.classList.add('translate-y-2', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        function addEXP(amount) {
            userState.exp += amount; let levelUp = false;
            if (userState.exp >= 100) { userState.exp -= 100; levelUp = true; playSound('levelUp'); showToast("🎉 恭喜！突破全新境界，修為大增！", "success"); }
            saveProgress(); updateHeaderUI(); return levelUp;
        }

        function updateHeaderUI() {
            document.getElementById('exp-ratio').textContent = `${userState.exp} / 100`;
            document.getElementById('exp-bar').style.width = `${userState.exp}%`;
            const total = userState.totalAnswered;
            document.getElementById('user-rank').textContent = total > 150 ? "太古英靈" : total > 75 ? "不滅大帝" : total > 35 ? "凌雲宗師" : total > 10 ? "破空劍士" : "新手侍從";
            document.getElementById('streak-count').textContent = userState.streak;
            if (userState.streak > userState.highestStreak) userState.highestStreak = userState.streak;
        }

        function renderDifficultySelector() {
            const container = document.getElementById('difficulty-tabs-container'), section = document.getElementById('difficulty-selector-section');
            if(!container || !section) return;
            if (userState.currentDojo !== 'vocab') { section.classList.add('hidden'); return; } else { section.classList.remove('hidden'); }
            container.innerHTML = '';
            [
                { id: 'basic', name: '<i class="fa-solid fa-seedling mr-1.5 opacity-80"></i>初級單字' },
                { id: 'intermediate', name: '<i class="fa-brands fa-pagelines mr-1.5 opacity-80"></i>中級單字' },
                { id: 'advanced', name: '<i class="fa-solid fa-tree mr-1.5 opacity-80"></i>中高級單字' }

        // Updated generateQuizOptions: strictly ensure non-duplicate options and fix state bug
        function generateQuizOptions(correctItem) {
            let pool = [];
            if(userState.currentDojo === 'vocab') {
                ['basic', 'intermediate', 'advanced'].forEach(d => {
                    for(let l=1; l<=7; l++){
                        if(mainDatabase.vocab[d] && mainDatabase.vocab[d][l]) pool = pool.concat(mainDatabase.vocab[d][l]);
                    }
                });
            } else {
                for(let l=1; l<=7; l++){
                    if(mainDatabase.phrase[l]) pool = pool.concat(mainDatabase.phrase[l]);
                }
            }

            let uniquePoolMap = new Map();
            pool.forEach(item => {
                if(item.word !== correctItem.word) uniquePoolMap.set(item.word, item);
            });
            let uniquePool = Array.from(uniquePoolMap.values());

            for (let i = uniquePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [uniquePool[i], uniquePool[j]] = [uniquePool[j], uniquePool[i]];
            }
            
            let wrongOptions = uniquePool.slice(0, 3);
            
            while (wrongOptions.length < 3) {
                wrongOptions.push({ word: "Dummy" + wrongOptions.length, chinese: "干擾選項" + wrongOptions.length });
            }

            const finalOptions = [correctItem, ...wrongOptions];
            for (let i = finalOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [finalOptions[i], finalOptions[j]] = [finalOptions[j], finalOptions[i]];
            }
            return finalOptions;
        }

        function appendSpellingLetter(char) {
            const input = document.getElementById('spelling-input');
            if (input) {
                input.value += char;
                input.focus();
                updateSpellingFragments(input.value);
            }
        }

        function updateSpellingFragments(inputValue) {
            const container = document.getElementById('scrambled-hint-container');
            if (!container) return;
            const fragments = container.querySelectorAll('.spelling-fragment');
            fragments.forEach(f => {
                f.classList.remove('opacity-20', 'line-through', 'scale-95', 'pointer-events-none');
                f.dataset.used = "false";
            });
            const typed = inputValue.toLowerCase().replace(/[^a-z0-9]/g, '').split('');
            typed.forEach(char => {
                for (let f of fragments) {
                    if (f.dataset.char === char && f.dataset.used === "false") {
                        f.dataset.used = "true";
                        f.classList.add('opacity-20', 'line-through', 'scale-95', 'pointer-events-none');
                        break;
                    }
                }
            });
        }

        function scrambleWordLetters(word) { 
            let letters = word.toLowerCase().split('').filter(char => /[a-z0-9]/i.test(char));
            for (let i = letters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [letters[i], letters[j]] = [letters[j], letters[i]];
            }
            return letters; 
        }

        function normalizeImportedJson(data) {
            let normalized = { vocab: { basic: {}, intermediate: {}, advanced: {} }, phrase: {} };
            ['basic', 'intermediate', 'advanced'].forEach(d => { for(let i=1;i<=7;i++) normalized.vocab[d][i] = []; });
            for(let i=1;i<=7;i++) normalized.phrase[i] = [];
            if (!data || typeof data !== 'object') return null;

            const processList = (list, isVocab, diff, lvl) => {
                list.forEach(item => {
                    if (item && item.word) {
                        const cleanItem = {
                            word: String(item.word || "").trim(), chinese: String(item.chinese || item.translation || "").trim(),
                            example: String(item.example || item.sentence || "").trim(), exampleCn: String(item.exampleCn || item.sentenceCn || "").trim(),
                            clozeQuestion: String(item.clozeQuestion || "").trim(), clozeCn: String(item.clozeCn || "").trim(),
                            clozeAnswer: String(item.clozeAnswer || item.word || "").trim(), unit: parseInt(item.unit) || 1
                        };
                        if(isVocab) normalized.vocab[diff][lvl].push(cleanItem);
                        else normalized.phrase[lvl].push(cleanItem);
                    }
                });
            };

            if (data.vocab) {
                if (data.vocab.basic || data.vocab.intermediate || data.vocab.advanced) {
                    ['basic', 'intermediate', 'advanced'].forEach(diff => {
                        if (data.vocab[diff]) for (let lvl = 1; lvl <= 7; lvl++) if (Array.isArray(data.vocab[diff][lvl])) processList(data.vocab[diff][lvl], true, diff, lvl);
                    });
                } else {
                    for (let lvl = 1; lvl <= 7; lvl++) if (Array.isArray(data.vocab[lvl])) processList(data.vocab[lvl], true, 'basic', lvl);
                }
            }
            if (data.phrase) for (let lvl = 1; lvl <= 7; lvl++) if (Array.isArray(data.phrase[lvl])) processList(data.phrase[lvl], false, null, lvl);
            return normalized;
        }

        async function fetchGitHubJson() {
            playSound('click'); const urlInput = document.getElementById('github-url-input'); const fetchBtn = document.getElementById('github-fetch-btn');
            if (!urlInput || !fetchBtn || !urlInput.value.trim()) return;
            const origBtnHtml = fetchBtn.innerHTML; fetchBtn.disabled = true; fetchBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1.5"></i> 下載同步中...`;
            const importMode = document.querySelector('input[name="github-import-mode"]:checked').value; 
            
            if (importMode === 'overwrite') {
                ['basic', 'intermediate', 'advanced'].forEach(d => { for(let l=1; l<=7; l++) mainDatabase.vocab[d][l] = []; });
                for(let l=1; l<=7; l++) mainDatabase.phrase[l] = [];
            }
            
            let url = urlInput.value.trim();
            if (/^https:\/\/github\.com\//i.test(url)) url = url.replace(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/i, 'https://raw.githubusercontent.com/$1/$2/$3/$4');

            try {
                const res = await fetch(url);
                if (res.ok) {
                    const data = normalizeImportedJson(await res.json());
                    if (data) {
                        ['basic', 'intermediate', 'advanced'].forEach(d => {
                            for(let l=1; l<=7; l++) {
                                data.vocab[d][l].forEach(item => { if(importMode === 'overwrite' || !mainDatabase.vocab[d][l].some(x => x.word === item.word)) mainDatabase.vocab[d][l].push(item); });
                            }
                        });
                        for(let l=1; l<=7; l++) {
                            data.phrase[l].forEach(item => { if(importMode === 'overwrite' || !mainDatabase.phrase[l].some(x => x.word === item.word)) mainDatabase.phrase[l].push(item); });
                        }
                        playSound('levelUp'); showToast("雲端提取成功！", "success");
                        setTimeout(() => { userState.currentTab = 'list'; saveProgress(); updateTabButtonsUI(); renderContent(); }, 1000);
                    }
                } else throw new Error();
            } catch(e) { playSound('wrong'); showToast("下載失敗，請檢查網址", "error"); }
            fetchBtn.disabled = false; fetchBtn.innerHTML = origBtnHtml;
        }

        async function backgroundSync(rawUrl, mode) {
            if (!rawUrl) return;
            let url = rawUrl; if (/^https:\/\/github\.com\//i.test(url)) url = url.replace(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/i, 'https://raw.githubusercontent.com/$1/$2/$3/$4');
            try {
                const res = await fetch(url);
                if (res.ok) {
                    if (mode === 'overwrite') {
                        ['basic', 'intermediate', 'advanced'].forEach(d => { for(let l=1; l<=7; l++) mainDatabase.vocab[d][l] = []; });
                        for(let l=1; l<=7; l++) mainDatabase.phrase[l] = [];
                    }
                    const data = normalizeImportedJson(await res.json());
                    if (data) {
                        ['basic', 'intermediate', 'advanced'].forEach(d => {
                            for(let l=1; l<=7; l++) {
                                data.vocab[d][l].forEach(item => { if(mode === 'overwrite' || !mainDatabase.vocab[d][l].some(x => x.word === item.word)) mainDatabase.vocab[d][l].push(item); });
                            }
                        });
                        for(let l=1; l<=7; l++) {
                            data.phrase[l].forEach(item => { if(mode === 'overwrite' || !mainDatabase.phrase[l].some(x => x.word === item.word)) mainDatabase.phrase[l].push(item); });
                        }
                        saveProgress(); renderContent(); showToast("背景同步完成", "success");
                    }
                }
            } catch(e) {}
            setTimeout(updateSyncBadgeUI, 2000);
        }

        function processBulkImport() {
            const ta = document.getElementById('bulk-import-area'); if (!ta || !ta.value.trim()) return;
            const diff = document.getElementById('bulk-difficulty').value, lvl = parseInt(document.getElementById('bulk-level').value), unit = parseInt(document.getElementById('bulk-unit').value);
            let added = 0;
            ta.value.trim().split(/\n\s*\n/).forEach(block => {
                const lines = block.split('\n').filter(l => l.trim().length > 0);
                if(lines.length >= 2) {
                    let w = lines[0].replace(/[\u4e00-\u9fa5].*/, '').trim(), c = lines[0].substring(w.length).trim();
                    let eg = "", egC = "", cq = "", cc = "", ca = w;
                    for(let i=1; i<lines.length; i++) {
                        let l = lines[i].toLowerCase();
                        if(l.startsWith("cloze:")) cq = lines[i].replace(/^cloze:\s*/i, "").trim();
                        else if(l.startsWith("clozecn:")) cc = lines[i].replace(/^clozecn:\s*/i, "").trim();
                        else if(l.startsWith("clozeans:")) ca = lines[i].replace(/^clozeans:\s*/i, "").trim();
                        else if(!eg) eg = lines[i].replace(/^Eg\d*:\s*/i, "").trim();
                        else if(!egC) egC = lines[i].trim();
                    }
                    if (w && c) {
                        const targetObj = { word: w, chinese: c, example: eg, exampleCn: egC, clozeQuestion: cq, clozeCn: cc, clozeAnswer: ca, unit: unit };
                        const dojo = w.includes(" ") ? 'phrase' : 'vocab';
                        if(dojo === 'vocab') { mainDatabase.vocab[diff][lvl].push(targetObj); added++; }
                        else { mainDatabase.phrase[lvl].push(targetObj); added++; }
                    }
                }
            });
            if (added > 0) { ta.value = ""; saveProgress(); showToast(`成功解析匯入！`, "success"); }
        }

        function saveSingleFormItem() {
            const w = document.getElementById('form-word').value.trim(), c = document.getElementById('form-chinese').value.trim();
            if(!w || !c) return;
            const dojo = document.getElementById('form-dojo').value, diff = document.getElementById('form-difficulty').value, lvl = parseInt(document.getElementById('form-level').value), unit = parseInt(document.getElementById('form-unit').value);
            const item = { word: w, chinese: c, example: document.getElementById('form-example').value.trim(), exampleCn: document.getElementById('form-example-cn').value.trim(), clozeQuestion: document.getElementById('form-cloze-q').value.trim(), clozeCn: document.getElementById('form-cloze-cn').value.trim(), clozeAnswer: document.getElementById('form-cloze-ans').value.trim() || w, unit: unit };
            if(dojo==='vocab') mainDatabase.vocab[diff][lvl].push(item); else mainDatabase.phrase[lvl].push(item);
            saveProgress(); showToast("單字儲存成功！", "success");
        }

            });
        }
        function deleteDatabaseItem(dojo, diff, lvl, idx) { playSound('wrong'); if(dojo==='vocab') mainDatabase.vocab[diff][lvl].splice(idx,1); else mainDatabase.phrase[lvl].splice(idx,1); saveProgress(); renderCustomLibraryTable(); }

        function openStatsModal() {
            playSound('click');
            const modal = document.getElementById('stats-dashboard-modal');
            document.getElementById('stats-total-answered').textContent = userState.totalAnswered;
            const accuracy = userState.totalAnswered > 0 ? Math.round((userState.correctCount / userState.totalAnswered) * 100) : 0;
            document.getElementById('stats-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stats-current-streak').textContent = userState.streak;
            document.getElementById('stats-highest-streak').textContent = userState.highestStreak || 0;
            let cefr = "A1 (築基)";
            if (userState.totalAnswered > 15) cefr = "A2 (煉氣)";
            if (userState.totalAnswered > 45) cefr = "B1 (結丹)";
            if (userState.totalAnswered > 90) cefr = "B2 (元嬰)";
            if (userState.totalAnswered > 150) cefr = "C1 (化神)";
            if (userState.totalAnswered > 250) cefr = "C2 (渡劫仙尊)";
            document.getElementById('stats-cefr-rank').textContent = cefr;
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.remove('scale-95');
        }

        function closeStatsModal() {
            playSound('click');
            const modal = document.getElementById('stats-dashboard-modal');
            modal.classList.add('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.add('scale-95');
        }

        function resetStats() {
            playSound('click');
            const modal = document.getElementById('custom-confirm-modal');
            document.getElementById('confirm-modal-title').textContent = "確定重置修行進度與連擊統計？";
            document.getElementById('confirm-modal-desc').textContent = "此操作將會把您修煉數據中的連擊次數、修行次數以及正確率重設歸零，但不會影響已導入的英文字彙庫。";
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.remove('scale-95');
            
            document.getElementById('confirm-modal-cancel').onclick = () => {
                playSound('click');
                modal.classList.add('pointer-events-none', 'opacity-0');
                modal.firstElementChild.classList.add('scale-95');
            };
            
            document.getElementById('confirm-modal-proceed').onclick = () => {
                playSound('click');
                userState.totalAnswered = 0;
                userState.correctCount = 0;
                userState.streak = 0;
                userState.highestStreak = 0;
                userState.exp = 0;
                saveProgress();
                updateHeaderUI();
                closeStatsModal();
                modal.classList.add('pointer-events-none', 'opacity-0');
                modal.firstElementChild.classList.add('scale-95');
                showToast("📊 修煉統計數據已重新回歸虛無！", "success");
            };
        }

        function clearDatabaseSource(sourceKey) {
            playSound('click');
            const modal = document.getElementById('custom-confirm-modal');
            document.getElementById('confirm-modal-title').textContent = "確定清空所有修煉大典嗎？";
            document.getElementById('confirm-modal-desc').textContent = "此動作將完全刪除修煉大典下所有的境界 Level 1 ~ 7 的英文字彙及生活例句，且無法還原！";
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.remove('scale-95');
            
            document.getElementById('confirm-modal-cancel').onclick = () => {
                playSound('click');
                modal.classList.add('pointer-events-none', 'opacity-0');
                modal.firstElementChild.classList.add('scale-95');
            };
            
            document.getElementById('confirm-modal-proceed').onclick = () => {
                playSound('wrong');
                mainDatabase = { vocab: { basic: {}, intermediate: {}, advanced: {} }, phrase: {} };
                ['basic', 'intermediate', 'advanced'].forEach(d => { for(let l=1; l<=7; l++) mainDatabase.vocab[d][l] = []; });
                for(let l=1; l<=7; l++) mainDatabase.phrase[l] = [];
                saveProgress();
                renderCustomLibraryTable();
                modal.classList.add('pointer-events-none', 'opacity-0');
                modal.firstElementChild.classList.add('scale-95');
                showToast("修煉大典已完全淨化清空！", "error");
            };
        }

        window.onkeydown = function(e) {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            const dataList = getActiveDataList(); if (dataList.length === 0) return;
            if (userState.currentTab === 'flashcard') {
                if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); flipFlashcard(); }
                else if (e.key === 'ArrowLeft') navigateFlashcard(-1, dataList.length); else if (e.key === 'ArrowRight') navigateFlashcard(1, dataList.length);
            } else if (userState.currentTab === 'quiz') {
                if (['1', '2', '3', '4'].includes(e.key)) { const btns = document.querySelectorAll('#quiz-options-container button'); const targetIdx = parseInt(e.key) - 1; if (btns[targetIdx] && !btns[targetIdx].disabled) btns[targetIdx].click(); }
                else if (e.key === 'Enter') { const btn = document.querySelector('#quiz-action-bar button'); if (btn && !btn.closest('.hidden')) btn.click(); }
            }
        };

        window.onload = function() {
            loadProgress();
            const urlSync = new URLSearchParams(window.location.search).get('sync');
            if (urlSync) { userState.autoSyncUrl = urlSync.trim(); userState.autoSyncOnLoad = true; saveProgress(); window.history.pushState({}, '', window.location.pathname); }
            updateDojoTabUI(); renderDifficultySelector(); renderLevelSelector(); renderUnitSelector(); renderContent(); updateHeaderUI(); updateTabButtonsUI(); updateSyncBadgeUI(); updateVoicePanelUI();
            if (userState.autoSyncOnLoad && userState.autoSyncUrl) backgroundSync(userState.autoSyncUrl, userState.autoSyncMode);
        };
    </script>
</body>
</html>
